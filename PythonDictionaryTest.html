<div class="wrapper">
<div class="quiz-card">

<div class="quiz-top">
<h3>Python Dictionary Test</h3>
<div id="progress"></div>
</div>

<div id="quizArea">
<div class="question" id="questionText"></div>
<div class="options" id="options"></div>

<div class="buttons">
<button id="prevBtn" onclick="prevQ()">Previous</button>
<button id="nextBtn" onclick="nextQ()">Next</button>
</div>
</div>

<div id="result" class="result"></div>

</div>
</div>

<script>

const API="http://127.0.0.1:5000";

const quiz=[

{q:"What is a dictionary in Python?",o:["Ordered list","Collection of key-value pairs","Loop"],a:1,e:"A dictionary stores data as key-value pairs."},

{q:"Which symbol is used to create a dictionary?",o:["[]","{}","()"],a:1,e:"Dictionaries use curly braces."},

{q:"Dictionary keys must be?",o:["Unique","Duplicate","Numbers only"],a:0,e:"Keys must be unique."},

{q:"Which function creates an empty dictionary?",o:["[]","{}","dict()"],a:2,e:"dict() creates an empty dictionary."},

{q:"How do you access dictionary values?",o:["Index","Key","Loop"],a:1,e:"Values are accessed using keys."},

{q:"Which method safely accesses values?",o:["get()","find()","search()"],a:0,e:"get() retrieves values safely."},

{q:"Which method returns dictionary keys?",o:["keys()","values()","items()"],a:0,e:"keys() returns dictionary keys."},

{q:"Which method returns dictionary values?",o:["keys()","values()","items()"],a:1,e:"values() returns dictionary values."},

{q:"Which method returns key-value pairs?",o:["keys()","values()","items()"],a:2,e:"items() returns key-value pairs."},

{q:"How to add an element to dictionary?",o:["append()","insert()","dict[key]=value"],a:2,e:"New pairs are added using dict[key]=value."},

{q:"Which method adds multiple elements?",o:["add()","update()","append()"],a:1,e:"update() adds multiple key-value pairs."},

{q:"Which keyword removes a dictionary element?",o:["delete","remove","del"],a:2,e:"del removes dictionary elements."},

{q:"Which method removes a specific key?",o:["delete()","pop()","remove()"],a:1,e:"pop() removes a key."},

{q:"Which method removes the last inserted pair?",o:["pop()","remove()","popitem()"],a:2,e:"popitem() removes last pair."},

{q:"Which method removes all elements?",o:["clear()","delete()","removeall()"],a:0,e:"clear() empties dictionary."},

{q:"Which function returns dictionary length?",o:["count()","len()","size()"],a:1,e:"len() returns number of elements."},

{q:"Which operator checks key existence?",o:["in","exists","check"],a:0,e:"in checks if key exists."},

{q:"Dictionary is?",o:["Immutable","Mutable","Constant"],a:1,e:"Dictionary values can be changed."},

{q:"Which method copies dictionary?",o:["clone()","copy()","duplicate()"],a:1,e:"copy() creates dictionary copy."},

{q:"Dictionary comprehension uses?",o:["[]","{}","()"],a:1,e:"Curly braces create dictionary comprehension."},

{q:"Example of dictionary comprehension?",o:["{x:x*x for x in range(5)}","[x*x for x in range(5)]","(x*x for x)"],a:0,e:"Curly braces generate dictionaries."},

{q:"Dictionary keys can be?",o:["Mutable","Immutable","Lists"],a:1,e:"Keys must be immutable."},

{q:"Which data structure stores key-value pairs?",o:["List","Tuple","Dictionary"],a:2,e:"Dictionary stores key-value pairs."},

{q:"Which operation combines dictionaries?",o:["merge","update()","join"],a:1,e:"update() merges dictionaries."},

{q:"Dictionary is mainly used for?",o:["Sorting","Mapping data","Loops"],a:1,e:"Dictionary maps keys to values."}

];

let cur=0;
let ans=new Array(quiz.length).fill(null);

function load(){

progress.innerText=`Question ${cur+1} of ${quiz.length}`;

questionText.innerText=`${cur+1}. ${quiz[cur].q}`;

options.innerHTML=quiz[cur].o.map((op,i)=>
`<div class="${ans[cur]===i?'selected':''}" onclick="selectOpt(${i})">${op}</div>`
).join("");

prevBtn.disabled=cur===0;

nextBtn.innerText=cur===quiz.length-1?"Submit":"Next";

}

function selectOpt(i){

ans[cur]=i;

load();

}

function nextQ(){

if(cur===quiz.length-1){

if(ans.includes(null)){

alert("Please answer all questions");

return;

}

showResult();

}else{

cur++;

load();

}

}

function prevQ(){

cur--;

load();

}

function showResult(){

let score=0;

let out="";

quiz.forEach((q,i)=>{

if(ans[i]===q.a) score++;

else out+=`
<div class="wrong">
<strong>Question:</strong> ${q.q}<br>
<strong>Your Answer:</strong> ${q.o[ans[i]]}<br>
<strong>Correct Answer:</strong> ${q.o[q.a]}
<div class="explain"><strong>Explanation:</strong> ${q.e}</div>
</div>`;

});


/* SAVE RESULT TO BACKEND */

fetch(API + "/save-quiz",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

credentials:"include",

body:JSON.stringify({
score:score,
total:quiz.length
})

});


quizArea.style.display="none";

result.innerHTML=
`<h3>Your Score: ${score} / ${quiz.length}</h3>` +
(out || `<div class="correct">Excellent! All answers are correct 🎉</div>`) +
`<br><button onclick="location.reload()">Restart Test</button>`;

}

load();

</script>
