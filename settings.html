<div class="settings-container">

<h2>Settings</h2>

<div class="settings-tabs">

<button class="active" onclick="showSettings('profile',this)">Profile</button>
<button onclick="showSettings('security',this)">Security</button>
<button onclick="showSettings('appearance',this)">Appearance</button>

</div>


<div class="settings-card">

<!-- PROFILE -->

<div id="profile-settings">

<h3>Profile Settings</h3>

<label>Name</label>
<input type="text" placeholder="Your Name">

<label>Email</label>
<input type="email" placeholder="Your Email">

<label>Bio</label>
<textarea placeholder="About you"></textarea>

<button class="save-btn">Save Changes</button>

</div>


<!-- SECURITY -->

<div id="security-settings" class="hidden">

<h3>Security Settings</h3>

<label>Current Password</label>
<input type="password">

<label>New Password</label>
<input type="password">

<label>Confirm Password</label>
<input type="password">

<button class="save-btn">Update Password</button>

</div>


<!-- APPEARANCE -->

<div id="appearance-settings" class="hidden">

<h3>Appearance</h3>

<div class="theme-toggle">

<span>Light</span>

<label class="switch">
<input type="checkbox" id="themeToggle" onchange="toggleTheme()">
<span class="slider"></span>
</label>

<span>Dark</span>

</div>

</div>

</div>

</div>
