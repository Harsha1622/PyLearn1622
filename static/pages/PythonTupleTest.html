<div class="wrapper">
  <div class="quiz-card">

    <div class="quiz-top">
      <h3>Python Tuple Test</h3>
      <div id="progress"></div>
    </div>

    <div id="quizArea">
      <div class="question" id="questionText"></div>
      <div class="options" id="options"></div>

      <div class="buttons">
        <button id="prevBtn">Previous</button>
        <button id="nextBtn">Next</button>
      </div>
    </div>

    <div id="result" class="result"></div>

  </div>
</div>

<!-- Quiz Data -->
<script src="/static/quizzes/tuple.js"></script>

<!-- Quiz Engine -->
<script src="/static/js/quiz-engine.js"></script>

<script>
const API = "https://pylearn-8niw.onrender.com";

function startQuiz(){

  if(typeof quizData === "undefined"){
    console.error("quizData not loaded");
    return;
  }

  if(typeof QuizEngine === "undefined"){
    console.error("QuizEngine not loaded");
    return;
  }

  new QuizEngine(quizData, API);
}

/* SPA-safe start */

if(document.readyState === "loading"){
  document.addEventListener("DOMContentLoaded", startQuiz);
}else{
  startQuiz();
}
</script>
