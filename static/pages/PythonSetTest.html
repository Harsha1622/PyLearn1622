<div class="wrapper">
<div class="quiz-card">

<div class="quiz-top">
<h3>Python Sets Test</h3>
<div id="progress"></div>
</div>

<div id="quizArea">
<div class="question" id="questionText"></div>
<div class="options" id="options"></div>

<div class="buttons">
<button id="prevBtn">Previous</button>
<button id="nextBtn">Next</button>
</div>
</div>

<div id="result" class="result"></div>

</div>
</div>

<script>

const API="https://pylearn-8niw.onrender.com";


const quiz=[

{q:"What is a set in Python?",o:["Ordered collection","Mutable sequence","Unordered collection of unique elements"],a:2,e:"A set is an unordered collection with unique elements."},

{q:"Which symbol is used to create a set?",o:["[]","{}","()"],a:1,e:"Sets are created using curly braces."},

{q:"Do sets allow duplicate values?",o:["Yes","No","Sometimes"],a:1,e:"Sets automatically remove duplicates."},

{q:"Which function creates an empty set?",o:["{}","set()","[]"],a:1,e:"set() creates an empty set."},

{q:"Which method adds one element?",o:["insert()","add()","append()"],a:1,e:"add() inserts a single element."},

{q:"Which method adds multiple elements?",o:["append()","extend()","update()"],a:2,e:"update() adds multiple elements."},

{q:"Which method removes a specific element?",o:["remove()","delete()","erase()"],a:0,e:"remove() deletes a specific element."},

{q:"Which method removes an element without error?",o:["delete()","discard()","remove()"],a:1,e:"discard() removes element safely."},

{q:"Which method removes a random element?",o:["remove()","pop()","discard()"],a:1,e:"pop() removes a random element."},

{q:"Which method removes all elements?",o:["delete()","clear()","removeall()"],a:1,e:"clear() empties the set."},

{q:"Sets support indexing?",o:["Yes","No","Sometimes"],a:1,e:"Sets are unordered and cannot be indexed."},

{q:"Which operator checks membership?",o:["in","exists","check"],a:0,e:"in checks if element exists."},

{q:"Which operator checks absence?",o:["not in","!","missing"],a:0,e:"not in checks absence."},

{q:"Union of sets combines?",o:["Common elements","All elements","Nothing"],a:1,e:"Union combines elements."},

{q:"Which method finds common elements?",o:["difference()","intersection()","union()"],a:1,e:"intersection() finds common elements."},

{q:"Difference operation returns?",o:["Common elements","Unique elements of first set","All elements"],a:1,e:"difference() returns unique elements."},

{q:"Symmetric difference returns?",o:["Common elements","Different elements","Duplicates"],a:1,e:"Symmetric difference returns non-common elements."},

{q:"What is a frozenset?",o:["Mutable set","Immutable set","List"],a:1,e:"frozenset is immutable."},

{q:"Which function creates frozenset?",o:["set()","frozenset()","freeze()"],a:1,e:"frozenset() creates immutable set."},

{q:"Can elements be added to frozenset?",o:["Yes","No","Sometimes"],a:1,e:"frozensets are immutable."},

{q:"Set comprehension uses?",o:["[]","()","{}"],a:2,e:"Set comprehension uses curly braces."},

{q:"Example of set comprehension?",o:["{x for x in range(5)}","[x for x in range(5)]","(x for x in range(5))"],a:0,e:"Curly braces create set comprehension."},

{q:"Which data structure stores unique elements?",o:["List","Tuple","Set"],a:2,e:"Sets store unique elements."},

{q:"Which operation is fastest in sets?",o:["Membership testing","Sorting","Indexing"],a:0,e:"Sets are optimized for membership testing."},

{q:"Which is correct set?",o:["{1,2,3}","[1,2,3]","(1,2,3)"],a:0,e:"Sets use curly braces."}

];


let cur=0;
let ans=new Array(quiz.length).fill(null);


/* DOM elements */

const progress=document.getElementById("progress");
const questionText=document.getElementById("questionText");
const options=document.getElementById("options");
const prevBtn=document.getElementById("prevBtn");
const nextBtn=document.getElementById("nextBtn");
const quizArea=document.getElementById("quizArea");
const result=document.getElementById("result");


function load(){

progress.innerText=`Question ${cur+1} of ${quiz.length}`;

questionText.innerText=`${cur+1}. ${quiz[cur].q}`;

options.innerHTML=quiz[cur].o.map((op,i)=>
`<div class="${ans[cur]===i?'selected':''}" onclick="selectOpt(${i})">${op}</div>`
).join("");

prevBtn.disabled=cur===0;

nextBtn.innerText=cur===quiz.length-1?"Submit":"Next";

}


function selectOpt(i){
ans[cur]=i;
load();
}


function nextQ(){

if(ans[cur]===null){
alert("Select an answer first");
return;
}

if(cur===quiz.length-1){
showResult();
}else{
cur++;
load();
}

}


function prevQ(){
cur--;
load();
}


function showResult(){

let score=0;
let out="";

quiz.forEach((q,i)=>{

if(ans[i]===q.a) score++;

else out+=`
<div class="wrong">
<strong>Question:</strong> ${q.q}<br>
<strong>Your Answer:</strong> ${q.o[ans[i]]}<br>
<strong>Correct Answer:</strong> ${q.o[q.a]}
<div><strong>Explanation:</strong> ${q.e}</div>
</div>`;

});


fetch(API+"/save-quiz",{
method:"POST",
headers:{"Content-Type":"application/json"},
credentials:"include",
body:JSON.stringify({score:score,total:quiz.length})
});


quizArea.style.display="none";

result.innerHTML=
`<h3>Your Score: ${score} / ${quiz.length}</h3>`+
(out||`<div class="correct">Excellent! All answers are correct 🎉</div>`)+
`<br><button onclick="location.reload()">Restart Test</button>`;

}


nextBtn.onclick=nextQ;
prevBtn.onclick=prevQ;


/* safe start for SPA pages */

setTimeout(load,100);

</script>
