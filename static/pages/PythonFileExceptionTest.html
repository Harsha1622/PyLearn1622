<div class="wrapper">
<div class="quiz-card">

<div class="quiz-top">
<h3>File Handling & Exception Handling Test</h3>
<div id="progress"></div>
</div>

<div id="quizArea">
<div class="question" id="questionText"></div>
<div class="options" id="options"></div>

<div class="buttons">
<button id="prevBtn">Previous</button>
<button id="nextBtn">Next</button>
</div>
</div>

<div id="result" class="result"></div>

</div>
</div>


<script>

const API="https://pylearn-8niw.onrender.com";

const quiz=[

{q:"Which function is used to open a file?",o:["file()","open()","read()"],a:1,e:"open() is used to open files."},
{q:"Which mode is used to read a file?",o:["w","r","a"],a:1,e:"r mode is used for reading."},
{q:"Which mode is used to write a file?",o:["r","w","a"],a:1,e:"w mode writes data to a file."},
{q:"Which mode appends data to a file?",o:["r","a","w"],a:1,e:"a mode adds data at the end."},
{q:"Which function reads entire file content?",o:["read()","write()","close()"],a:0,e:"read() reads full content."},
{q:"Which function reads one line at a time?",o:["read()","readline()","readlines()"],a:1,e:"readline() reads a single line."},
{q:"Which function closes a file?",o:["exit()","close()","stop()"],a:1,e:"close() closes the file."},
{q:"Which keyword automatically closes files?",o:["with","open","close"],a:0,e:"with statement auto-closes files."},
{q:"Which error occurs if file not found?",o:["TypeError","FileNotFoundError","IndexError"],a:1,e:"FileNotFoundError occurs."},
{q:"What is an exception?",o:["Loop","Error during execution","Function"],a:1,e:"Exception is runtime error."},
{q:"Which block contains risky code?",o:["except","try","finally"],a:1,e:"try block contains risky code."},
{q:"Which block handles exceptions?",o:["try","except","error"],a:1,e:"except handles exceptions."},
{q:"Which keyword is used to raise exception?",o:["throw","raise","error"],a:1,e:"raise triggers an exception."},
{q:"Which block always executes?",o:["except","finally","raise"],a:1,e:"finally block always runs."},
{q:"Which error occurs when dividing by zero?",o:["ValueError","TypeError","ZeroDivisionError"],a:2,e:"Division by zero raises ZeroDivisionError."},
{q:"Which error occurs for wrong data type?",o:["ValueError","TypeError","IndexError"],a:1,e:"TypeError occurs."},
{q:"Which keyword handles multiple exceptions?",o:["elif","except","case"],a:1,e:"Multiple except blocks can be used."},
{q:"User defined exceptions inherit from?",o:["Error","Exception","Object"],a:1,e:"They inherit from Exception class."},
{q:"Custom exceptions are created using?",o:["loop","class","function"],a:1,e:"Classes create custom exceptions."},
{q:"Which keyword triggers custom exception?",o:["throw","raise","stop"],a:1,e:"raise triggers it."},
{q:"Which function writes to file?",o:["read()","write()","open()"],a:1,e:"write() adds data."},
{q:"Which function reads multiple lines?",o:["readlines()","read()","line()"],a:0,e:"readlines() returns list of lines."},
{q:"Which block runs if no exception occurs?",o:["except","else","finally"],a:1,e:"else runs when no error occurs."},
{q:"Which keyword handles errors safely?",o:["try","safe","catch"],a:0,e:"try handles risky code."},
{q:"Why exception handling is used?",o:["Stop program","Handle errors","Delete errors"],a:1,e:"It handles runtime errors."}

];

let cur=0;
let ans=new Array(quiz.length).fill(null);

let progress,questionText,options,prevBtn,nextBtn,quizArea,result;

/* initialize after page loads */

function initQuiz(){

progress=document.getElementById("progress");
questionText=document.getElementById("questionText");
options=document.getElementById("options");
prevBtn=document.getElementById("prevBtn");
nextBtn=document.getElementById("nextBtn");
quizArea=document.getElementById("quizArea");
result=document.getElementById("result");

nextBtn.onclick=nextQ;
prevBtn.onclick=prevQ;

load();

}

function load(){

progress.innerText=`Question ${cur+1} of ${quiz.length}`;

questionText.innerText=`${cur+1}. ${quiz[cur].q}`;

options.innerHTML=quiz[cur].o.map((op,i)=>
`<div class="${ans[cur]===i?'selected':''}" onclick="selectOpt(${i})">${op}</div>`
).join("");

prevBtn.disabled=cur===0;

nextBtn.innerText=cur===quiz.length-1?"Submit":"Next";

}

function selectOpt(i){
ans[cur]=i;
load();
}

function nextQ(){

if(ans[cur]===null){
alert("Select an answer first");
return;
}

if(cur===quiz.length-1){
showResult();
}else{
cur++;
load();
}

}

function prevQ(){
cur--;
load();
}

function showResult(){

let score=0;
let out="";

quiz.forEach((q,i)=>{

if(ans[i]===q.a) score++;

else out+=`
<div class="wrong">
<strong>Question:</strong> ${q.q}<br>
<strong>Your Answer:</strong> ${q.o[ans[i]]}<br>
<strong>Correct Answer:</strong> ${q.o[q.a]}
<div><strong>Explanation:</strong> ${q.e}</div>
</div>`;

});

fetch(API+"/save-quiz",{
method:"POST",
headers:{ "Content-Type":"application/json" },
credentials:"include",
body:JSON.stringify({score:score,total:quiz.length})
});

quizArea.style.display="none";

result.innerHTML=
`<h3>Your Score: ${score} / ${quiz.length}</h3>`+
(out||`<div class="correct">Excellent! All answers are correct 🎉</div>`)+
`<br><button onclick="location.reload()">Restart Test</button>`;

}

/* safe start for SPA */

setTimeout(initQuiz,50);

</script>
