<div class="wrapper">
<div class="quiz-card">

<div class="quiz-top">
<h3>Python Lists – Practice Test</h3>
<div id="progress"></div>
</div>

<div id="quizArea">

<div class="question" id="questionText"></div>

<div class="options" id="options"></div>

<div class="buttons">
<button id="prevBtn" onclick="prevQ()">Previous</button>
<button id="nextBtn" onclick="nextQ()">Next</button>
</div>

</div>

<div id="result" class="result"></div>

</div>
</div>


<script>

const API="https://pylearn-8niw.onrender.com";


const quiz=[

{q:"Which symbol is used to create a list?",o:["()","{}","[]"],a:2,e:"Lists are created using square brackets []."},

{q:"Which data structure stores multiple values in one variable?",o:["List","Integer","Float"],a:0,e:"Lists store multiple values."},

{q:"List elements are separated by?",o:["Semicolon","Comma","Colon"],a:1,e:"Elements in lists are separated by commas."},

{q:"List index starts from?",o:["1","0","-1"],a:1,e:"Indexing starts from 0."},

{q:"Lists in Python are?",o:["Mutable","Immutable","Constant"],a:0,e:"Lists are mutable."},

{q:"Which operator combines two lists?",o:["*","+","/"],a:1,e:"+ operator concatenates lists."},

{q:"Which operator repeats list elements?",o:["*","+","-"],a:0,e:"* repeats list elements."},

{q:"Which keyword checks membership?",o:["in","is","with"],a:0,e:"'in' checks if element exists."},

{q:"Which keyword checks absence?",o:["without","not in","except"],a:1,e:"'not in' checks absence."},

{q:"Which method adds element to list?",o:["append()","insert()","add()"],a:0,e:"append() adds element at end."},

{q:"Which method inserts element at specific position?",o:["append()","insert()","replace()"],a:1,e:"insert() adds element at index."},

{q:"Which method removes element by value?",o:["delete()","remove()","pop()"],a:1,e:"remove() deletes specified value."},

{q:"Which method removes last element?",o:["remove()","pop()","delete()"],a:1,e:"pop() removes last item."},

{q:"Which method returns position of element?",o:["find()","search()","index()"],a:2,e:"index() returns position."},

{q:"Which method sorts list?",o:["order()","arrange()","sort()"],a:2,e:"sort() arranges elements."},

{q:"Which method reverses list?",o:["reverse()","flip()","back()"],a:0,e:"reverse() reverses list."},

{q:"Which method counts occurrences?",o:["count()","sum()","total()"],a:0,e:"count() counts occurrences."},

{q:"Which operation extracts part of list?",o:["Slicing","Indexing","Looping"],a:0,e:"Slicing extracts part."},

{q:"Example of slicing syntax?",o:["list[1:3]","list(1:3)","list{1:3}"],a:0,e:"Slicing uses colon."},

{q:"Which loop is commonly used to traverse list?",o:["if","for","switch"],a:1,e:"for loop traverses list."},

{q:"Which property allows list modification?",o:["Mutability","Immutability","Fixity"],a:0,e:"Lists are mutable."},

{q:"Aliasing means?",o:["Copying list","Two variables referencing same list","Deleting list"],a:1,e:"Aliasing refers to same memory."},

{q:"Which method copies a list?",o:["clone()","copy()","duplicate()"],a:1,e:"copy() creates list copy."},

{q:"Which feature creates list in one line?",o:["Loop","Function","List comprehension"],a:2,e:"List comprehension creates list quickly."},

{q:"Example of list comprehension?",o:["[x for x in range(5)]","x in range(5)","for x list"],a:0,e:"List comprehension example."}

];


let cur=0;
let ans=new Array(quiz.length).fill(null);


function load(){

document.getElementById("progress").innerText=
`Question ${cur+1} of ${quiz.length}`;

document.getElementById("questionText").innerText=
`${cur+1}. ${quiz[cur].q}`;

document.getElementById("options").innerHTML=
quiz[cur].o.map((op,i)=>
`<div class="${ans[cur]===i?'selected':''}" onclick="selectOpt(${i})">${op}</div>`
).join("");

document.getElementById("prevBtn").disabled=cur===0;

document.getElementById("nextBtn").innerText=
cur===quiz.length-1?"Submit":"Next";

}


function selectOpt(i){

ans[cur]=i;
load();

}


function nextQ(){

if(ans[cur]===null){
alert("Select an answer first");
return;
}

if(cur===quiz.length-1){
showResult();
}else{
cur++;
load();
}

}


function prevQ(){

cur--;
load();

}


function showResult(){

let score=0;
let out="";

quiz.forEach((q,i)=>{

if(ans[i]===q.a) score++;

else out+=`
<div class="wrong">
<strong>Question:</strong> ${q.q}<br>
<strong>Your Answer:</strong> ${q.o[ans[i]]}<br>
<strong>Correct Answer:</strong> ${q.o[q.a]}
<div><strong>Explanation:</strong> ${q.e}</div>
</div>`;

});


fetch(API+"/save-quiz",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

credentials:"include",

body:JSON.stringify({
score:score,
total:quiz.length
})

});


document.getElementById("quizArea").style.display="none";

document.getElementById("result").innerHTML=
`<h3>Your Score: ${score} / ${quiz.length}</h3>`+
(out||`<div class="correct">Excellent! All answers are correct 🎉</div>`)+
`<br><button onclick="location.reload()">Restart Quiz</button>`;

}


/* SPA safe start */

setTimeout(load,100);

 </script>
