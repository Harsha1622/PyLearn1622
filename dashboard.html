<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PyLearn | Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="pystyle.css">

</head>

<body>

<header>
  <h2>PyLearn</h2>

  <nav>
    <a href="#" onclick="loadPage('home.html')">Home</a>
    <a href="#" onclick="loadPage('course.html')">Courses</a>

    <div class="profile" id="profileMenu">
      <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png">

      <div class="profile-menu">
        <a href="#" onclick="loadPage('profile.html')">My Profile</a>
        <a href="#" onclick="loadPage('dashboard.html')">Dashboard</a>
        <button onclick="logout()">Logout</button>
      </div>
    </div>

  </nav>
</header>

<main>

  <div class="dashboard-title">Python Learning Dashboard</div>

  <div class="stats">

    <div class="stat-card">
      <h3 id="topicCount">0</h3>
      <p>Topics Completed</p>
    </div>

    <div class="stat-card">
      <h3 id="quizCount">0</h3>
      <p>Quizzes Attempted</p>
    </div>

    <div class="stat-card">
      <h3 id="avgScore">0%</h3>
      <p>Average Score</p>
    </div>

  </div>

  <section>

    <h4>Python Learning Progress</h4>

    <div class="progress-box">

      <span id="progressText">Python Programming – 0%</span>

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

    </div>

  </section>

  <section>

    <h4>Quick Actions</h4>

    <div class="actions">

      <button class="action-btn">Continue Learning</button>

      <button class="action-btn" onclick="loadPage('profile.html')">
        View Profile
      </button>

    </div>

  </section>

</main>

<script src="pyapp.js"></script>

</body>
</html>
