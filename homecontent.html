<div class="hero">

  <div class="hero-text">

    <h2>Learn Python with PyLearn</h2>

    <p>
      Structured Python lessons, quizzes, and progress tracking designed
      to help students learn programming step by step.
    </p>

    <!-- SEARCH BAR -->

    <div class="hero-search">

      <input
        type="text"
        id="heroSearch"
        placeholder="Search Python lessons..."
        onkeyup="searchContent()"
      >

      <div id="searchResults" class="search-results"></div>

    </div>

    <button onclick="loadPage('course.html')">
      Start Learning
    </button>

  </div>


  <!-- LOGIN CARD -->

  <div class="login-card" id="loginCard">

    <h3>Student Login</h3>

    <form id="loginForm">

      <input
        type="email"
        id="email"
        placeholder="Email"
        required
      >

      <input
        type="password"
        id="password"
        placeholder="Password"
        required
      >

      <button type="submit">Login</button>

    </form>

    <p>
      New here?
      <a onclick="loadPage('signup.html')">Create an account</a>
    </p>

  </div>

</div>
